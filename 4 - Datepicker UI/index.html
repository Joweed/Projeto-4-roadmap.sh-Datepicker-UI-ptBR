<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <title>Datepicker UI</title>
</head>
<body>
    <div class="calendar">
        <div class="putYourDate"><input type="date" placeholder="DD/MM/AAAA"></div>
        <div class="chooseMonth">
            <img src="style/leftArrow.png" alt="Seta para esquerda" class="arrow">
            <span class="currentMonth">Dezembro de 2022</span>
            <img src="style/rightArrow.png" alt="Seta para direita" class="arrow">
        </div>
        <div class="daysOfWeek">
            <span class="sunday">Dom</span>
            <span>Seg</span>
            <span>Ter</span>
            <span>Qua</span>
            <span>Qui</span>
            <span>Sex</span>
            <span>Sab</span>
        </div>
        <div class="daysGrid">
            <button class="nonWorkingDay">27</button>
            <button class="lastMonthDay">28</button>
            <button class="lastMonthDay">29</button>
            <button class="lastMonthDay">30</button>
            <button class="day">1</button>
            <button class="day">2</button>
            <button class="day">3</button>
            <button class="nonWorkingDay">4</button>
            <button class="day">5</button>
            <button class="day">6</button>
            <button class="day">7</button>
            <button class="day">8</button>
            <button class="day">9</button>
            <button class="day">10</button>
            <button class="nonWorkingDay">11</button>
            <button class="day">12</button>
            <button class="day">13</button>
            <button class="day">14</button>
            <button class="day">15</button>
            <button class="day">16</button>
            <button class="day">17</button>
            <button class="nonWorkingDay">18</button>
            <button class="day">19</button>
            <button class="day">20</button>
            <button class="day">21</button>
            <button class="day">22</button>
            <button class="day">23</button>
            <button class="day">24</button>
            <button class="nonWorkingDay">25</button>
            <button class="day">26</button>
            <button class="day">27</button>
            <button class="day">28</button>
            <button class="day">29</button>
            <button class="day">30</button>
            <button class="day">31</button>
        </div>
    </div>
</body>
</html>
